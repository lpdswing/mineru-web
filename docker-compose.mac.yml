services:
  frontend:
    build:
      context: ./frontend
    image: mineru-web-frontend:mac-local
    ports:
      - "8088:80"
    depends_on:
      - backend
      - minio
    networks:
      - mineru-network

  backend:
    build:
      context: ./backend
    image: mineru-web-backend:mac-local
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_MDS_BUCKET=mds
      - DATABASE_URL=sqlite:////data/mineru.db
      - MINERU_API_URL=http://host.docker.internal:18000
    volumes:
      - backend_data:/data
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mineru-network

  worker:
    build:
      context: ./backend
    image: mineru-web-backend:mac-local
    command: python3 run_worker.py
    environment:
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_MDS_BUCKET=mds
      - DATABASE_URL=sqlite:////data/mineru.db
      - MINERU_API_URL=http://host.docker.internal:18000
    volumes:
      - backend_data:/data
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - mineru-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mineru-network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mineru-network

volumes:
  backend_data:
  minio_data:
  redis_data:

networks:
  mineru-network:
    driver: bridge
