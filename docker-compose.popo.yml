services:
  popo-postprocessor:
    build:
      context: ./popo-postprocessor
    image: mineru-web-popo-postprocessor:local
    profiles:
      - popo
    ports:
      - "8010:8010"
    environment:
      - TZ=Asia/Shanghai
      - MINIO_ENDPOINT=${POPO_MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - POPO_ARTIFACT_ROOT=${POPO_ARTIFACT_ROOT:-/mineru-output}
      - POPO_OPENAI_BASE_URL=${POPO_OPENAI_BASE_URL:-}
      - POPO_OPENAI_API_KEY=${POPO_OPENAI_API_KEY:-dummy}
      - POPO_OPENAI_MODEL=${POPO_OPENAI_MODEL:-Popo}
      - POPO_OPENAI_MAX_TOKENS=${POPO_OPENAI_MAX_TOKENS:-1024}
    volumes:
      - popo_workspace:/workspace
      - ${POPO_ARTIFACT_SOURCE:-mineru_api_output}:/mineru-output:ro
    networks:
      - mineru-network

volumes:
  popo_workspace:
  mineru_api_output:

networks:
  mineru-network:
    external: false
