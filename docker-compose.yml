services:
  frontend:
    image: lpdswing/mineru-web-frontend:v3.2.3
    ports:
      - "8088:80"
    depends_on:
      - backend
      - minio
    networks:
      - mineru-network

  backend:
    image: lpdswing/mineru-web-backend:v3.2.3
    environment:
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?set MINIO_ENDPOINT to a host address reachable by browser and containers, e.g. SERVER_IP:9000}
      - DATABASE_URL=sqlite:///./mineru.db
      - MINERU_API_URL=http://mineru-api:8000
      - SERVER_URL=http://mineru-vllm-server:30000
    volumes:
      - ./backend:/app
      - ./mineru.json:/root/mineru.json
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mineru-api:
        condition: service_healthy
    networks:
      - mineru-network

  worker:
    image: lpdswing/mineru-web-backend:v3.2.3
    deploy:
      # 设置 worker 副本数量，根据显存调整，多gpu可以手动拓展worker
      replicas: ${WORKER_REPLICAS:-1}
    command: python3 run_worker.py
    environment:
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?set MINIO_ENDPOINT to a host address reachable by browser and containers, e.g. SERVER_IP:9000}
      - DATABASE_URL=sqlite:///./mineru.db
      - MINERU_API_URL=http://mineru-api:8000
      - SERVER_URL=http://mineru-vllm-server:30000  # vllm server服务地址
      # WORKER_ID 由代码自动使用容器 hostname 生成，无需手动配置
      # - MINERU_TABLE_MERGE_ENABLE=0  # 关闭表格合并
      # - MINERU_PDF_RENDER_TIMEOUT    # pdf渲染超时配置，默认300s
      # - MINERU_INTRA_OP_NUM_THREADS  # oonx模型线程数
      # - MINERU_INTER_OP_NUM_THREADS  # oonx模型线程数
      # - MINERU_FORMULA_CH_SUPPORT    # 0/1，开启中文公式解析，开启可能导致MRF性能下降，长公式解析失败
    volumes:
      - ./backend:/app
      - ./mineru.json:/root/mineru.json
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mineru-api:
        condition: service_healthy
    networks:
      - mineru-network

  mineru-api:
    image: lpdswing/mineru-web-mineru-api:v3.2.3
    container_name: mineru-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      MINERU_MODEL_SOURCE: local
      MINERU_API_OUTPUT_ROOT: /output
    entrypoint: mineru-api
    command:
      --host 0.0.0.0
      --port 8000
      --allow-public-http-client
    volumes:
      - ./mineru.json:/root/mineru.json
      - ./models2.0:/models
      - mineru_api_output:/output
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
    depends_on:
      mineru-vllm-server:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - mineru-network

  mineru-vllm-server:
    image: lpdswing/mineru-web-mineru-api:v3.2.3
    container_name: mineru-vllm-server
    restart: always
    ports:
      - "30000:30000"
    environment:
      MINERU_MODEL_SOURCE: local
    entrypoint: mineru-vllm-server
    command:
      --host 0.0.0.0
      --port 30000
      --gpu-memory-utilization 0.5
    volumes:
      - ./mineru.json:/root/mineru.json
      - ./models2.0:/models
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:30000/health || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - mineru-network



  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mineru-network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mineru-network

volumes:
  minio_data:
  redis_data:
  mineru_api_output:

networks:
  mineru-network:
    driver: bridge
