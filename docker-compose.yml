services:
  frontend:
    image: lpdswing/mineru-web-frontend:v3.3.1
    ports:
      - "8088:80"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
      - minio
    networks:
      - mineru-network

  backend:
    image: lpdswing/mineru-web-backend:v3.3.1
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?set MINIO_ENDPOINT to a host address reachable by browser and containers, e.g. SERVER_IP:9000}
      - DATABASE_URL=sqlite:///./mineru.db
      - MINERU_API_URL=http://mineru-router:8002
      - MINERU_API_HYBRID_EFFORT=${MINERU_API_HYBRID_EFFORT:-high}
      - SERVER_URL=${SERVER_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mineru-router:
        condition: service_healthy
    networks:
      - mineru-network

  worker:
    image: lpdswing/mineru-web-backend:v3.3.1
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    command: python3 run_worker.py
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?set MINIO_ENDPOINT to a host address reachable by browser and containers, e.g. SERVER_IP:9000}
      - DATABASE_URL=sqlite:///./mineru.db
      - MINERU_API_URL=http://mineru-router:8002
      - MINERU_API_HYBRID_EFFORT=${MINERU_API_HYBRID_EFFORT:-high}
      - SERVER_URL=${SERVER_URL:-}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
      - MINERU_API_USE_ASYNC_TASKS=${MINERU_API_USE_ASYNC_TASKS:-0}
      - POPO_ENABLED=${POPO_ENABLED:-0}
      - POPO_API_URL=${POPO_API_URL:-http://popo-postprocessor:8010}
      - POPO_TIMEOUT_SECONDS=${POPO_TIMEOUT_SECONDS:-1800}
      # WORKER_ID 由代码自动使用容器 hostname 生成，无需手动配置
      # - MINERU_TABLE_MERGE_ENABLE=0  # 关闭表格合并
      # - MINERU_PDF_RENDER_TIMEOUT    # pdf渲染超时配置，默认300s
      # - MINERU_INTRA_OP_NUM_THREADS  # oonx模型线程数
      # - MINERU_INTER_OP_NUM_THREADS  # oonx模型线程数
      # - MINERU_FORMULA_CH_SUPPORT    # 0/1，开启中文公式解析，开启可能导致MRF性能下降，长公式解析失败
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mineru-router:
        condition: service_healthy
    networks:
      - mineru-network

  mineru-router:
    image: lpdswing/mineru-web-mineru-api:v3.3.1
    container_name: mineru-router
    restart: always
    ports:
      - "8002:8002"
    environment:
      TZ: Asia/Shanghai
      MINERU_MODEL_SOURCE: local
      MINERU_API_OUTPUT_ROOT: /output
    entrypoint: mineru-router
    # Aligned with MinerU's official router compose shape.
    # To aggregate existing mineru-api services instead of starting local workers:
    #   replace --local-gpus auto with --local-gpus none
    #   add repeated --upstream-url http://mineru-api:8000 entries
    # Parameters for vllm-engine:
    #   add --gpu-memory-utilization 0.5
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8002"
      - --local-gpus
      - auto
      # Disabled by default upstream when binding publicly; enabled here so
      # configured *-http-client backends/server_url can work.
      - --allow-public-http-client
    volumes:
      # Runtime patch is bind-mounted so page-aware Markdown fixes can be
      # deployed with a container restart instead of rebuilding the MinerU image.
      - ./backend/mineru_api_patch:/app/mineru_api_patch:ro
      - mineru_api_output:/output
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"] # Modify for multiple GPUs: ["0", "1"]
              capabilities: [gpu]
    networks:
      - mineru-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mineru-network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mineru-network

volumes:
  minio_data:
  redis_data:
  mineru_api_output:

networks:
  mineru-network:
    driver: bridge
